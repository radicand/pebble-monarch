<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monarch Net Worth Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      color: #0f172a;
      background: #f8fafc;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.08);
      padding: 16px;
      max-width: 560px;
      margin: 0 auto;
    }
    h2 {
      margin: 0 0 8px;
      color: #0c4a6e;
    }
    .hint {
      margin: 0 0 12px;
      font-size: 13px;
      color: #334155;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      font-size: 14px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #94a3b8;
      border-radius: 8px;
      font-size: 14px;
    }
    .privacy {
      margin-top: 12px;
      border-left: 4px solid #0284c7;
      background: #f0f9ff;
      padding: 10px;
      font-size: 12px;
      color: #0f172a;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      font-weight: 700;
      font-size: 14px;
    }
    #cancel {
      background: #e2e8f0;
      color: #0f172a;
    }
    #save {
      background: #0369a1;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Monarch Net Worth</h2>
    <p class="hint">Enter your Monarch credentials for phone-side sync.</p>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Monarch password" />

    <label for="mfaCode">MFA code (optional)</label>
    <input id="mfaCode" type="text" placeholder="Current 6-digit code" />

    <label for="refreshMinutes">Refresh interval (minutes)</label>
    <input id="refreshMinutes" type="number" min="5" max="120" value="30" />

    <div class="privacy">
      Credentials are stored in PebbleKit JS local storage on your phone and sent directly to Monarch API. They are never sent to the watch.
    </div>

    <div class="actions">
      <button id="cancel" type="button">Cancel</button>
      <button id="save" type="button">Save</button>
    </div>
  </div>

  <script>
    function parseParams() {
      var out = {};
      var query = globalThis.location.search || '';
      if (query.indexOf('?') === 0) {
        query = query.slice(1);
      }
      if (!query) {
        return out;
      }
      query.split('&').forEach(function(part) {
        if (!part) {
          return;
        }
        var idx = part.indexOf('=');
        if (idx === -1) {
          return;
        }
        var key = decodeURIComponent(part.slice(0, idx));
        var val = decodeURIComponent(part.slice(idx + 1));
        out[key] = val;
      });
      return out;
    }

    function closeWith(data) {
      document.location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(data || {}));
    }

    (function prefill() {
      var params = parseParams();
      if (params.email) {
        document.getElementById('email').value = params.email;
      }
      if (params.refreshMinutes) {
        document.getElementById('refreshMinutes').value = params.refreshMinutes;
      }
    })();

    document.getElementById('cancel').addEventListener('click', function() {
      closeWith({ cancelled: true });
    });

    document.getElementById('save').addEventListener('click', function() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var mfaCode = document.getElementById('mfaCode').value.trim();
      var refreshMinutes = Number.parseInt(document.getElementById('refreshMinutes').value, 10);

      if (!email) {
        alert('Email is required.');
        return;
      }

      if (!Number.isFinite(refreshMinutes) || refreshMinutes < 5 || refreshMinutes > 120) {
        alert('Refresh interval must be between 5 and 120 minutes.');
        return;
      }

      closeWith({
        email: email,
        password: password,
        mfaCode: mfaCode,
        refreshMinutes: refreshMinutes
      });
    });
  </script>
</body>
</html>
